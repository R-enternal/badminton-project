server:
  port: 8080

spring:
  application:
    name: badminton-server

  datasource:
    url: jdbc:mysql://localhost:3306/badminton_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: "060311"
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.badminton.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redisson 分布式锁配置
redisson:
  single-server-config:
    address: redis://127.0.0.1:6379
    database: 0
    connection-minimum-idle-size: 8
    connection-pool-size: 32

# SpringDoc + Knife4j 接口文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      display-name: 默认分组
      paths-to-match: /api/**
      packages-to-scan: com.badminton.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
    swagger-model-name: 实体类列表

# JWT 配置
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing-must-be-at-least-32-characters}
  expiration: 604800000  # 7天，单位毫秒

# 默认管理员配置（生产环境请通过环境变量覆盖，切勿使用默认密码）
admin:
  default:
    phone: ${DEFAULT_ADMIN_PHONE:13800138000}
    password: ${DEFAULT_ADMIN_PASSWORD:}

# 微信支付配置（开发阶段为占位符，上线前替换）
wechat:
  miniapp:
    app-id: wx__YOUR_APPID__
    app-secret: __YOUR_APPSECRET__
  pay:
    mch-id: __YOUR_MCH_ID__
    api-v3-key: __YOUR_API_V3_KEY__
    private-key-path: classpath:apiclient_key.pem
    notify-url: https://api.yourdomain.com/api/pay/notify/wechat
